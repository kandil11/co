<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive MCQ revision quiz on Computer Architecture — logic microoperations, shifts, ALU, and addressing modes.">
  <title>Computer Architecture Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
    <span class="theme-icon sun">☀️</span>
    <span class="theme-icon moon">🌙</span>
  </button>

  <div class="app-container">
    <!-- ───── START SCREEN ───── -->
    <section id="start-screen" class="screen active">
      <div class="card start-card">
        <div class="start-hero">
          <div class="hero-icon">🧠</div>
          <h1>Computer Architecture</h1>
          <p class="subtitle">MCQ Revision Quiz</p>
          <div class="question-count-badge" id="total-count-badge">171 Questions</div>
        </div>

        <div class="settings-group">
          <label class="setting-label">Topics / Lectures</label>
          <div class="topic-chips" id="topic-chips">
            <button class="topic-chip active" data-topic="all">
              <span class="chip-icon">📚</span>
              <span>All Topics</span>
            </button>
            <!-- Filled by JS -->
          </div>
        </div>

        <div class="settings-group">
          <label class="setting-label">Timer per question</label>
          <div class="timer-options" id="timer-options">
            <button class="timer-btn active" data-time="0">Off</button>
            <button class="timer-btn" data-time="30">30s</button>
            <button class="timer-btn" data-time="60">60s</button>
            <button class="timer-btn" data-time="90">90s</button>
          </div>
        </div>

        <div class="settings-group">
          <label class="setting-label">Number of questions</label>
          <div class="timer-options" id="count-options">
            <button class="timer-btn" data-count="10">10</button>
            <button class="timer-btn" data-count="20">20</button>
            <button class="timer-btn" data-count="50">50</button>
            <button class="timer-btn active" data-count="all">All</button>
          </div>
        </div>

        <button id="start-btn" class="btn btn-primary btn-lg pulse-glow">
          <span>Start Quiz</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

        <div class="high-score-display" id="high-score-display" style="display:none">
          <span>🏆 Best:</span>
          <span id="high-score-value"></span>
        </div>
      </div>
    </section>

    <!-- ───── QUIZ SCREEN ───── -->
    <section id="quiz-screen" class="screen">
      <div class="quiz-header">
        <div class="progress-info">
          <span id="question-counter">Question 1 of 20</span>
          <span id="score-counter" class="score-pill">Score: 0</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div class="timer-display" id="timer-display" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span id="timer-text">30</span>
        </div>
      </div>

      <div class="question-area" id="question-area">
        <div class="card question-card" id="question-card">
          <p class="question-text" id="question-text"></p>
        </div>

        <div class="options-grid" id="options-grid">
          <!-- Rendered by JS -->
        </div>

        <div class="feedback-bar" id="feedback-bar">
          <span class="feedback-icon" id="feedback-icon"></span>
          <span class="feedback-text" id="feedback-text"></span>
          <span class="explanation-text" id="explanation-text"></span>
        </div>

        <button id="next-btn" class="btn btn-primary btn-next" style="display:none">
          Next Question
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </section>

    <!-- ───── RESULT SCREEN ───── -->
    <section id="result-screen" class="screen">
      <div class="card result-card">
        <div class="result-emoji" id="result-emoji">🎉</div>
        <h2 class="result-title" id="result-title">Great Job!</h2>

        <div class="score-ring-container">
          <svg class="score-ring" viewBox="0 0 120 120">
            <circle class="score-ring-bg" cx="60" cy="60" r="52"/>
            <circle class="score-ring-fill" id="score-ring-fill" cx="60" cy="60" r="52"/>
          </svg>
          <div class="score-ring-text">
            <span class="score-number" id="score-number">0</span>
            <span class="score-percent">%</span>
          </div>
        </div>

        <p class="result-detail" id="result-detail">You got 15 out of 20 correct</p>
        <p class="result-message" id="result-message">Keep it up!</p>

        <div class="result-stats">
          <div class="stat correct-stat">
            <span class="stat-num" id="stat-correct">0</span>
            <span class="stat-label">Correct</span>
          </div>
          <div class="stat wrong-stat">
            <span class="stat-num" id="stat-wrong">0</span>
            <span class="stat-label">Wrong</span>
          </div>
          <div class="stat skip-stat">
            <span class="stat-num" id="stat-skipped">0</span>
            <span class="stat-label">Skipped</span>
          </div>
        </div>

        <div class="result-actions">
          <button id="restart-btn" class="btn btn-primary btn-lg">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            Restart Quiz
          </button>
          <button id="home-btn" class="btn btn-secondary btn-lg">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </button>
        </div>
      </div>
    </section>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
